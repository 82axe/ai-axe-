<style>
:root {
  --bg:#0a0a0b;--bg2:#111114;--bg3:#18181c;
  --border:#2a2a30;--border2:#3a3a44;
  --text:#e8e8ec;--text2:#8888a0;--text3:#555566;
  --accent:#c8a96e;--accent2:#a07840;
  --teal:#4ecdc4;--purple:#9b8fdb;--coral:#e07070;
  --green:#5aad7a;--blue:#6a9fd8;--pink:#d4789a;
  --mono:'IBM Plex Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;height:100vh;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.18;pointer-events:none;z-index:0;}
.layout{display:flex;height:100vh;position:relative;z-index:1;}

/* 사이드바 */
.sidebar{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-logo{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.logo-mark{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--accent);letter-spacing:4px;}
.logo-sub{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:2px;margin-top:3px;}

.pinned-section{padding:10px 10px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pinned-label{font-family:var(--mono);font-size:8px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;padding:0 4px;}
.pinned-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:all 0.12s;background:var(--bg3);border:1px solid var(--border2);color:var(--accent);}
.pinned-item:hover,.pinned-item.active{border-color:var(--accent);background:#1e1a12;}
.pinned-name{font-size:12px;font-weight:500;}
.pinned-desc{font-size:10px;color:var(--accent2);margin-top:1px;}

.sidebar-nav{flex:1;overflow-y:auto;padding:6px 0 8px;}
.sidebar-nav::-webkit-scrollbar{width:2px;}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border2);}

.folder{margin-bottom:2px;}
.folder-header{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:all 0.12s;user-select:none;}
.folder-header:hover{background:var(--bg3);}
.folder-arrow{font-family:var(--mono);font-size:9px;color:var(--text3);transition:transform 0.2s;flex-shrink:0;}
.folder-arrow.open{transform:rotate(90deg);}
.folder-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.folder-name{font-family:var(--mono);font-size:10px;letter-spacing:1px;flex:1;}
.folder-count{font-family:var(--mono);font-size:9px;color:var(--text3);}
.folder-items{display:none;}
.folder-items.open{display:block;}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 26px;cursor:pointer;transition:all 0.12s;color:var(--text2);font-size:12px;border-left:2px solid transparent;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--bg3);color:var(--text);border-left-color:var(--accent);}
.nav-num{font-family:var(--mono);font-size:9px;color:var(--text3);min-width:18px;flex-shrink:0;}

.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0;}
.db-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:4px;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--coral);flex-shrink:0;}
.status-dot.on{background:var(--green);box-shadow:0 0 4px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* 메인 */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{height:46px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;background:var(--bg2);flex-shrink:0;}
.topbar-module{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:1px;}
.topbar-module span{color:var(--accent);}
.topbar-spacer{flex:1;}
.btn{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:5px 11px;font-family:var(--mono);font-size:10px;color:var(--text2);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.btn:hover{border-color:var(--accent2);color:var(--accent);}
.btn.danger:hover{border-color:var(--coral);color:var(--coral);}

/* 채팅 */
.chat-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.chat-header{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2);flex-shrink:0;}
.chat-title{font-family:var(--mono);font-size:11px;color:var(--text2);}
.chat-badge{font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:20px;border:1px solid;}
.persona-desc{font-size:11px;color:var(--text3);flex:1;}
.chat-area{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.msg{display:flex;gap:10px;animation:fadeUp 0.2s ease;}
.msg.user{flex-direction:row-reverse;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-av{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:500;flex-shrink:0;margin-top:2px;}
.msg.user .msg-av{background:var(--accent2);color:#fff;}
.msg.agent .msg-av{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);}
.msg-bubble{max-width:74%;padding:9px 13px;border-radius:7px;line-height:1.75;font-size:13px;}
.msg.user .msg-bubble{background:var(--bg3);border:1px solid var(--border2);border-top-right-radius:2px;}
.msg.agent .msg-bubble{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:2px;}
.msg-bubble.thinking{color:var(--text3);font-family:var(--mono);font-size:11px;}
.thinking-dots span{animation:blink 1.2s infinite;opacity:0;}
.thinking-dots span:nth-child(2){animation-delay:0.2s;}
.thinking-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.msg-bubble strong{color:var(--accent);font-weight:500;}
.msg-bubble code{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:var(--mono);font-size:11px;color:var(--teal);}

.chat-input-area{padding:10px 18px 14px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-ta{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-family:var(--sans);font-size:13px;color:var(--text);resize:none;outline:none;min-height:40px;max-height:110px;line-height:1.6;transition:border-color 0.12s;}
.chat-ta:focus{border-color:var(--border2);}
.chat-ta::placeholder{color:var(--text3);}
.send-btn{background:var(--accent2);border:1px solid var(--accent);border-radius:7px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.12s;color:#fff;flex-shrink:0;}
.send-btn:hover{background:var(--accent);}
.send-btn:disabled{opacity:0.35;cursor:not-allowed;}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);}
.empty-mark{font-family:var(--mono);font-size:32px;color:var(--border2);letter-spacing:6px;}
.empty-text{font-family:var(--mono);font-size:11px;letter-spacing:1px;}
.save-badge{font-family:var(--mono);font-size:9px;color:var(--green);padding:1px 6px;border:1px solid var(--green);border-radius:10px;margin-left:6px;opacity:0;transition:opacity 0.3s;}
.save-badge.show{opacity:1;}
</style>
</head>
<body>
<div class="layout">

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">AXE</div>
    <div class="logo-sub">설계자 대시보드 v4.0</div>
  </div>
  <div class="pinned-section">

<main class="main">

      <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:4px;">대화 기록은 Firebase에 자동 저장됩니다</div>

    <div id="chat-ui" style="display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden;">
      <div class="chat-header">

        <span class="chat-badge" id="chat-badge"></span>
        <div class="persona-desc" id="persona-desc"></div>
      </div>
      <div class="chat-area" id="chat-area"></div>
      <div class="chat-input-area">
        <div class="input-row">
          <textarea class="chat-ta" id="chat-input" placeholder="메시지를 입력하세요..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M14 8L2 2l3 6-3 6 12-6z" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</main>
</div>

<script>
const WORKER_URL = 'https://cold-leaf-86c9axe-api.www-exclusive-82.workers.dev';

const FOLDERS = [
  { id:'keychat', name:'키챗', color:'#9b8fdb', personas:[
    {id:'kc1',num:'01',name:'제품 설계자',short:'기능·UX·방향성',system:`넌 키챗(키워드 챗) 전담 제품 설계자야.\n키챗 미션: "키워드로 연결되는 세상, 관계 이전에 관심이 먼저"\n현재 v5 구조(Home/Chat/SNS피드/뉴스탭) 완전히 숙지하고 있어.\n기능 기획, UX 구조, 화면 설계, 기능 우선순위 판단 담당.\n"이 기능이 미션에 맞는가" 항상 검증해줘.\nAXE는 1인 개발자라 리소스 한계 고려해서 현실적으로 조언해.\n간결하고 결론 먼저. 한국어로.`},
    {id:'kc2',num:'02',name:'프론트엔드 개발자',short:'HTML·CSS·JS·UI',system:`넌 키챗 프론트엔드 전담 개발자야.\nHTML, CSS, JavaScript, keychat_v5.html 구조 완전히 알고 있어.\n사용자는 비전공자야. 절대 어렵게 말하지 마.\n항상 "몇 번째 줄 찾아서 이걸로 바꿔" 수준으로 알려줘.\n코드는 복사해서 바로 쓸 수 있게 완성형으로 줘.\n이론 설명 최소화. 실행 가능한 답변만. 한국어로.`},
    {id:'kc3',num:'03',name:'백엔드 개발자',short:'Firebase·DB·서버',system:`넌 키챗 백엔드 전담 개발자야.\nFirebase(Auth, Firestore, FCM, Storage) 전문.\n현재 키챗은 localStorage 기반이고 Firebase 통합이 다음 단계야.\n데이터 구조 설계, 보안 규칙, 실시간 동기화 담당.\n사용자는 비전공자야. 콘솔에서 클릭하는 것부터 코드 붙여넣는 것까지 단계별로 알려줘. 한국어로.`},
    {id:'kc4',num:'04',name:'앱 개발자',short:'Capacitor·APK·배포',system:`넌 키챗 모바일 앱 전담 개발자야.\nCapacitor + Android Studio 기반 APK 빌드 담당.\n현재 키챗 APK 빌드 완료, 기기 설치까지 성공한 상태야.\n다음 단계: Google Play 배포.\n비전공자 기준으로 터미널 명령어 하나하나 알려줘. 한국어로.`},
    {id:'kc5',num:'05',name:'API 연동 전문가',short:'외부서비스·텔레그램·뉴스',system:`넌 키챗의 외부 서비스 연동 전담이야.\n현재 연동된 서비스: NewsData.io, 텔레그램 Bot API, Claude API.\n새로운 API 붙이는 법, 기존 연동 오류 해결 담당.\n비전공자도 따라할 수 있게 코드 완성형으로 줘. 한국어로.`},
    {id:'kc6',num:'06',name:'보안 전문가',short:'익명성·암호화·보호',system:`넌 키챗 보안 전담이야.\n키챗의 핵심 가치: 완전 익명성, 개인정보 무수집, E2E 암호화.\n"이 구조가 익명성을 침해하는가" 항상 검증해줘.\n법적 리스크(개인정보보호법, 정보통신망법)와 연결해서 조언해. 한국어로.`},
    {id:'kc7',num:'07',name:'Web3 설계자',short:'토큰·블록체인·Web3',system:`넌 키챗 Web3 로드맵 전담이야.\n로드맵: Web2(익명) → Web2.5(기여 블록체인) → Web3(키워드별 토큰)\n토큰 이코노미 설계, 스마트 컨트랙트, DAO 구조 담당.\n지금 당장이 아닌 2~3년 후를 설계하는 관점으로 조언해. 한국어로.`},
    {id:'kc8',num:'08',name:'비즈니스 전략가',short:'수익·투자·사업판단',system:`넌 키챗 비즈니스 전담 전략가야.\n수익모델: 배너 광고(현재) → 키워드 타겟 광고 → 프리미엄 기능 → 토큰 이코노미\nAXE는 노가다로 생계 유지하며 개발 중. 자본 최소화가 핵심.\n감정 없이 숫자와 현실 기준으로 조언해. 쓴소리도 필수. 한국어로.`},
    {id:'kc9',num:'09',name:'커뮤니티 생태계',short:'공성전·룸생태계·알고리즘',system:`넌 키챗 커뮤니티 메커니즘 전담이야.\n공성전 시스템: 룸=성, 룸오너=영주, 기여도 점수=권력\nHOT TOP10 알고리즘, 키워드 룸 생태계, 유저 간 권력 구조 담당.\n게임 이론, 인센티브 설계 관점으로 분석해. 한국어로.`},
    {id:'kc10',num:'10',name:'성장·마케팅',short:'유저확보·바이럴·론칭',system:`넌 키챗 성장 전담이야.\n목표: MVP 완성 후 첫 1000명 유저 확보.\n돈 없이 할 수 있는 전략 우선. 실행 가능한 것만. 한국어로.`},

    html += `<div class="folder">
      <div class="folder-header" onclick="toggleFolder('${f.id}')">
        <span class="folder-arrow ${isOpen?'open':''}">▶</span>
        <span class="folder-dot" style="background:${f.color}"></span>
        <span class="folder-name" style="color:${f.color}">${f.name}</span>
        <span class="folder-count">${f.personas.length}</span>
      </div>
      <div class="folder-items ${isOpen?'open':''}">`;
    f.personas.forEach(p => {
      html += `<div class="nav-item" id="nav-${p.id}" onclick="selectPersona('${p.id}')">
        <span class="nav-num" style="color:${f.color}88">${p.num}</span>
        <span>${p.name}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  nav.innerHTML = html;
}

function toggleFolder(id) {
  openFolders.has(id) ? openFolders.delete(id) : openFolders.add(id);
  renderSidebar();
  if (currentPersona) {
    const el = document.getElementById('nav-' + currentPersona.id);
    if (el) el.classList.add('active');
  }
}

async function selectPersona(id) {
  const map = allPersonas();
  currentPersona = map[id];
  if (!currentPersona) return;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');
  document.getElementById('pin-classics').classList.toggle('active', id === 'classics');

  const folder = FOLDERS.find(f => f.personas.find(p => p.id === id));
  const color = folder ? folder.color : '#c8a96e';

  document.getElementById('topbar-name').textContent = currentPersona.name;
  document.getElementById('chat-title').textContent = currentPersona.name;
  document.getElementById('chat-badge').textContent = currentPersona.num;
  document.getElementById('chat-badge').style.color = color;
  document.getElementById('chat-badge').style.borderColor = color;
  document.getElementById('persona-desc').textContent = currentPersona.short;
  document.getElementById('chat-input').placeholder = currentPersona.name + '에게 메시지...';

  document.getElementById('empty-state').style.display = 'none';
  const ui = document.getElementById('chat-ui');
  ui.style.display = 'flex';
  ui.style.flex = '1';
  ui.style.flexDirection = 'column';
  ui.style.minHeight = '0';
  ui.style.overflow = 'hidden';

  await loadHistory(id);
  document.getElementById('chat-input').focus();
}

async function loadHistory(personaId) {
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  currentMessages = [];

  if (!dbReady) {
    const welcome = WELCOMES[personaId] || '무엇이든 말씀하세요.';
    addBubble('agent', welcome, false);
    return;
  }

  try {
    const db = window._db;
    const q = window._query(
      window._col(db, 'conversations'),
      window._where('personaId', '==', personaId),
      window._orderBy('timestamp', 'asc')
    );
    const snapshot = await window._getDocs(q);

    if (snapshot.empty) {
      const welcome = WELCOMES[personaId] || '무엇이든 말씀하세요.';
      addBubble('agent', welcome, false);
    } else {
      snapshot.forEach(doc => {
        const data = doc.data();
        currentMessages.push({ role: data.role, content: data.content });
        addBubble(data.role, data.role === 'user' ? data.content : fmt(data.content), false);
      });
    }
  } catch (err) {
    const welcome = WELCOMES[personaId] || '무엇이든 말씀하세요.';
    addBubble('agent', welcome, false);
  }
}

async function saveMessage(personaId, role, content) {
  if (!dbReady) return;
  try {
    await window._addDoc(window._col(window._db, 'conversations'), {
      personaId, role, content,
      timestamp: Date.now()
    });
    showSaveBadge();
  } catch (err) {
    console.error('저장 오류:', err);
  }
}

async function clearCurrent() {
  if (!currentPersona) return;
  if (!confirm('이 에이전트의 대화 기록을 모두 삭제할까요?')) return;

  if (dbReady) {
    try {
      const db = window._db;
      const q = window._query(
        window._col(db, 'conversations'),
        window._where('personaId', '==', currentPersona.id)
      );
      const snapshot = await window._getDocs(q);
      const deletes = [];
      snapshot.forEach(d => deletes.push(window._deleteDoc(window._doc(db, 'conversations', d.id))));
      await Promise.all(deletes);
    } catch(e) {}
  }

  currentMessages = [];
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  const welcome = WELCOMES[currentPersona.id] || '무엇이든 말씀하세요.';
  addBubble('agent', welcome, false);
}

function addBubble(role, html, animate = true) {
  const area = document.getElementById('chat-area');
  const av = role === 'user' ? 'AXE' : (currentPersona ? currentPersona.num : '?');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'agent');
  if (!animate) div.style.animation = 'none';
  div.innerHTML = `<div class="msg-av">${av}</div><div class="msg-bubble">${html}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addThinking() {
  const area = document.getElementById('chat-area');
  const id = 'think-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg agent'; div.id = id;
  div.innerHTML = `<div class="msg-av">${currentPersona ? currentPersona.num : '?'}</div>
    <div class="msg-bubble thinking"><span class="thinking-dots"><span>·</span><span>·</span><span>·</span></span></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return id;
}

function removeThinking(id) { const el = document.getElementById(id); if (el) el.remove(); }

function fmt(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

async function sendMsg() {
  if (!currentPersona) { showToast('에이전트를 선택하세요'); return; }
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';

  currentMessages.push({ role: 'user', content: text });
  addBubble('user', text);
  await saveMessage(currentPersona.id, 'user', text);

  document.getElementById('send-btn').disabled = true;
  const thinkId = addThinking();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: currentPersona.system,
        messages: currentMessages
      })
    });

    const data = await res.json();
    removeThinking(thinkId);

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      currentMessages.push({ role: 'assistant', content: reply });
      addBubble('agent', fmt(reply));
      await saveMessage(currentPersona.id, 'assistant', reply);
    } else {
      addBubble('agent', '오류: ' + JSON.stringify(data.error || data));
    }
  } catch (err) {
    removeThinking(thinkId);
    addBubble('agent', '연결 오류: ' + err.message);
  }

  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').focus();
}

function showSaveBadge() {
  const badge = document.getElementById('save-badge');
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2000);
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--bg3);border:1px solid var(--border2);border-radius:5px;
    padding:7px 14px;font-family:var(--mono);font-size:10px;color:var(--text2);
    z-index:9999;white-space:nowrap;`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

renderSidebar();
</script>
</body>
</html>
